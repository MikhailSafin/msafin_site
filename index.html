<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mikhail Safin | Investment Consulting</title>
    <meta name="description" content="Mikhail Safin, CFA. Investment consulting for private clients and entrepreneurs.">
    <style>
        :root {
            --bg: #0d1713;
            --bg2: #13211b;
            --card: rgba(17, 28, 23, 0.86);
            --card2: rgba(12, 20, 16, 0.94);
            --line: rgba(209, 176, 88, 0.18);
            --gold: #d1b058;
            --text: #f4f0e4;
            --muted: #b7b2a2;
            --shadow: 0 28px 64px rgba(0, 0, 0, 0.34);
            --xl: 34px;
            --lg: 24px;
            --md: 18px;
            --maxw: 1180px;
        }
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: Georgia, "Times New Roman", serif;
            background:
                radial-gradient(circle at 12% 10%, rgba(209,176,88,.17), transparent 24%),
                radial-gradient(circle at 84% 14%, rgba(124,162,124,.12), transparent 20%),
                linear-gradient(135deg, rgba(9,14,12,.98), rgba(18,31,25,.96));
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(180deg, rgba(255,255,255,.02), transparent 18%),
                repeating-linear-gradient(90deg, rgba(209,176,88,.03), rgba(209,176,88,.03) 1px, transparent 1px, transparent 120px),
                repeating-linear-gradient(0deg, rgba(209,176,88,.015), rgba(209,176,88,.015) 1px, transparent 1px, transparent 120px);
            opacity: .65;
        }
        a { color: inherit; text-decoration: none; }
        button { font: inherit; }
        .shell {
            position: relative;
            width: min(var(--maxw), calc(100vw - 28px));
            margin: 0 auto;
            padding: 20px 0 34px;
            z-index: 1;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }
        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-size: 12px;
            letter-spacing: .08em;
            text-transform: uppercase;
        }
        .mark {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border-radius: 14px;
            color: var(--gold);
            border: 1px solid var(--line);
            background: rgba(255,255,255,.04);
            font-size: 18px;
            font-weight: 700;
        }
        .lang {
            display: inline-flex;
            gap: 4px;
            padding: 4px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255,255,255,.05);
        }
        .lang button {
            min-width: 58px;
            min-height: 38px;
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
        }
        .lang button.active {
            background: var(--gold);
            color: #141108;
        }
        .card {
            background: linear-gradient(180deg, var(--card), var(--card2));
            border: 1px solid var(--line);
            border-radius: var(--xl);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }
        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(300px, .85fr);
            gap: 22px;
            padding: 28px;
            overflow: hidden;
        }
        .copy {
            display: grid;
            align-content: start;
            gap: 18px;
        }
        .eyebrow {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            min-height: 36px;
            padding: 0 14px;
            border-radius: 999px;
            border: 1px solid rgba(209,176,88,.24);
            background: rgba(209,176,88,.11);
            color: var(--gold);
            font-size: 12px;
            letter-spacing: .08em;
            text-transform: uppercase;
        }
        h1 {
            margin: 0;
            font-size: clamp(42px, 7vw, 84px);
            line-height: .92;
            letter-spacing: -.05em;
        }
        .subtitle {
            margin: 0;
            font-size: 24px;
            color: var(--gold);
            letter-spacing: -.03em;
        }
        .lead {
            margin: 0;
            max-width: 720px;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.75;
        }
        .chips, .cta, .contact-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            min-height: 36px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255,255,255,.04);
            color: var(--muted);
            font-size: 14px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0 18px;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: transform .18s ease;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn.primary { color: #171107; background: var(--gold); }
        .btn.secondary {
            color: var(--text);
            background: rgba(255,255,255,.05);
            border-color: var(--line);
        }
        .side {
            position: relative;
        }
        .side::before {
            content: "";
            position: absolute;
            width: 220px;
            height: 220px;
            right: -30px;
            top: -26px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(209,176,88,.2), rgba(209,176,88,0));
            filter: blur(6px);
            pointer-events: none;
        }
        .portrait {
            height: 100%;
            aspect-ratio: 3 / 4;
            overflow: hidden;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,.08);
            background:
                radial-gradient(circle at top, rgba(209,176,88,.1), transparent 36%),
                rgba(255,255,255,.04);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,.05),
                0 24px 54px rgba(0,0,0,.22),
                0 0 0 1px rgba(209,176,88,.06);
        }
        .portrait img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 24%;
            transform: scale(1.09);
            filter: saturate(1.08) contrast(1.06) brightness(.98);
        }
        .section { margin-top: 18px; padding: 24px; }
        .head {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 16px;
            margin-bottom: 18px;
        }
        .head h2 {
            margin: 0;
            font-size: 34px;
            letter-spacing: -.04em;
        }
        .head p {
            margin: 0;
            max-width: 640px;
            color: var(--muted);
            line-height: 1.75;
        }
        .grid3, .metrics {
            display: grid;
            gap: 14px;
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }
        .focus {
            margin-top: 18px;
            padding: 22px;
            background:
                linear-gradient(180deg, rgba(209,176,88,.14), rgba(255,255,255,.03)),
                linear-gradient(180deg, rgba(17,28,23,.9), rgba(12,20,16,.94));
        }
        .focus-head {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 16px;
            margin-bottom: 18px;
        }
        .focus-head h2 {
            margin: 0;
            font-size: 32px;
            letter-spacing: -.04em;
        }
        .focus-head p {
            margin: 0;
            max-width: 620px;
            color: var(--muted);
            line-height: 1.7;
        }
        .focus-grid {
            display: grid;
            gap: 14px;
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }
        .focus-card {
            padding: 18px;
            border-radius: var(--lg);
            border: 1px solid rgba(209,176,88,.22);
            background: rgba(8, 14, 11, .24);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
        }
        .focus-card strong {
            display: block;
            margin-bottom: 8px;
            color: var(--gold);
            font-size: 22px;
            letter-spacing: -.03em;
        }
        .focus-card span {
            color: var(--text);
            line-height: 1.65;
        }
        .metrics { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        .panel, .metric {
            padding: 18px;
            border-radius: var(--lg);
            border: 1px solid var(--line);
            background: rgba(255,255,255,.04);
        }
        .metric {
            background: linear-gradient(180deg, rgba(209,176,88,.1), rgba(255,255,255,.03));
        }
        .panel h3 {
            margin: 0 0 10px;
            font-size: 22px;
            letter-spacing: -.03em;
        }
        .panel p, .panel li, .panel .meta, .metric span {
            margin: 0;
            color: var(--muted);
            line-height: 1.75;
            font-size: 16px;
        }
        .panel ul { margin: 0; padding-left: 18px; }
        .metric strong {
            display: block;
            margin-bottom: 4px;
            color: var(--gold);
            font-size: 34px;
            letter-spacing: -.04em;
        }
        .contact {
            display: grid;
            gap: 18px;
            grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
        }
        .contact-list a {
            display: inline-flex;
            align-items: center;
            min-height: 42px;
            padding: 0 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255,255,255,.05);
        }
        .note {
            margin-top: 18px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.65;
        }
        @media (max-width: 980px) {
            .hero, .grid3, .focus-grid, .metrics, .contact { grid-template-columns: 1fr; }
            .hero { padding: 20px; }
            .section { padding: 20px; }
            .portrait { aspect-ratio: 4 / 5; }
            .head, .focus-head { align-items: start; flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="topbar">
            <div class="brand">
                <div class="mark">MS</div>
                <span>Mikhail Safin Advisory</span>
            </div>
            <div class="lang" aria-label="Language switch">
                <button type="button" data-set-lang="ru">RU</button>
                <button type="button" data-set-lang="en">EN</button>

        <section class="card hero">

        <section class="card section">

        <section class="card section">

                <div class="metric"><strong>MBA</strong><span data-i18n="metric_4"></span></div>
            </div>
        </section>

        <section class="card section">
            <div class="head">
                <h2 data-i18n="background_title"></h2>
                <p data-i18n="background_intro"></p>
            </div>
            <div class="grid3">
                <article class="panel">
                    <h3 data-i18n="profile_title"></h3>
                    <p data-i18n="profile_text"></p>

                <article class="panel">
                    <h3 data-i18n="education_title"></h3>

                <article class="panel">

        <section class="card section" id="contact">

                        <a href="https://t.me/sfnmike" target="_blank" rel="noopener">@sfnmike</a>
                        <a href="https://t.me/InvestSafin" target="_blank" rel="noopener">t.me/InvestSafin</a>

    <script src="./site.js"></script>
</body>
</html>
